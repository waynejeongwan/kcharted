name: K-pop Spotify 스트리밍 수집 (kworb)

on:
  schedule:
    # 매일 오전 7시 KST = 22:00 UTC (전일)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run daily scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/kworb_scrape.py

      - name: Summary
        if: always()
        run: |
          python3 - <<'EOF'
          import os, datetime
          today = datetime.date.today().strftime("%Y-%m-%d")
          run_url = f"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          summary = f"## K-pop 스트리밍 수집 — {today}\n\n[Actions 상세]({run_url})\n"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(summary)
          EOF
