name: Talk of the Charts 예측 수집

on:
  schedule:
    # Early  : 월요일 오전 10시 KST = 월요일 01:00 UTC
    - cron: '0 1 * * 1'
    # Midweek: 수요일 오전 10시 KST = 수요일 01:00 UTC
    - cron: '0 1 * * 3'
    # Final  : 토요일 오전 10시 KST = 토요일 01:00 UTC
    - cron: '0 1 * * 6'
  workflow_dispatch:
    inputs:
      image_url:
        description: '이미지 URL 직접 지정 (선택)'
        required: false
      stage:
        description: '단계 강제 지정: early / midweek / final (선택)'
        required: false
      chart_date:
        description: '예측 대상 날짜 YYYY-MM-DD (선택)'
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          EXTRA_ARGS=""

          # workflow_dispatch 수동 입력 처리
          if [ -n "${{ github.event.inputs.image_url }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --url '${{ github.event.inputs.image_url }}'"
          fi
          if [ -n "${{ github.event.inputs.stage }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --stage ${{ github.event.inputs.stage }}"
          fi
          if [ -n "${{ github.event.inputs.chart_date }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --chart-date ${{ github.event.inputs.chart_date }}"
          fi

          eval python scripts/talkofthecharts_scrape.py $EXTRA_ARGS

      - name: Build summary
        if: always()
        run: |
          python3 - <<'EOF'
          import os, datetime
          today = datetime.date.today().strftime("%Y-%m-%d")
          run_url = f"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          weekday = datetime.date.today().weekday()
          stages = {0: 'early', 1: 'early', 2: 'midweek', 3: 'midweek', 5: 'final', 6: 'final'}
          stage = stages.get(weekday, 'midweek')

          summary = f"""## Talk of the Charts 예측 수집 — {today}

          **단계: {stage}**

          [Actions 상세 보기]({run_url})
          """
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(summary)
          EOF
